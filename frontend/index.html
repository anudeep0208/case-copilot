<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Co-Pilot | Rally Test Gen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header class="box header">
            <h1>Case Co-Pilot: AI Test Case Generator for Rally</h1>
        </header>

        <div class="input-row">
            <input type="text" id="storyID" class="box input-box" placeholder="User Story ID (e.g., US12345)">
            <input type="email" id="userEmail" class="box input-box" placeholder="User Email">
            <select id="testType" class="box input-box">
                <option value="Functional">Functional Testing</option>
                <option value="UAT">UAT</option>
                <option value="Regression">Regression</option>
                <option value="Security">Security</option>
            </select>
            <div class="box input-box placeholder"></div> </div>

        <textarea id="acceptanceCriteria" class="box text-area" placeholder="Enter Acceptance Criteria here..."></textarea>

        <div class="button-container">
            <button id="generateBtn" onclick="generateTestCases()">Generate Testcases</button>
            <div id="loader" class="hidden">🤖 AI Agents are working...</div>
        </div>

        <div id="downloadSection" class="box download-box hidden">
            <p>Test cases generated successfully! Download your CSV below.</p>
            
            <a id="downloadLink" href="#" class="download-button" onclick="handleDownload()">
                📄 Download CSV File
            </a>
            
            <p class="small-text">After download, the page will reset.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
